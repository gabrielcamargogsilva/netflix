<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serviços de Streaming</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <button id="tema-trocar" onclick="trocarTema()"
            style="position:absolute;top:1rem;right:1rem;z-index:10;background:none;border:none;font-size:2rem;cursor:pointer"
            aria-label="Alternar tema">
            <span class="icone-tema" aria-hidden="true">🌓</span></button>

        <h1>Qual serviço de Streaming deseja acessar?</h1>

        <ul class="lista-servicos">
            <li class="item-servico">
                <a href="https://www.primevideo.com/offers/nonprimehomepage/ref=dv_web_force_root?gad_source=1&gad_campaignid=23482762750&gclid=CjwKCAjw-J3OBhBuEiwAwqZ_hxXZXmsynktlJ9eHV-ml3H_5bDN0U56ileITa_Ze5n4DlJwyzonewxoCoG8QAvD_BwE&irgwc=1&irclickid=2ee833ceN2ae611f1a4c851871a1fb62&afsrc=1&gbraid=0AAAAApxTTtj_RTIO5INp5aFNrZTjgyxvQ" class="servico">
                    <figure class="avatar-container">
                        <span class="imagem-perfil tema-cris" aria-hidden="true">
                            <span class="icone-avatar">
                                <img src="assets/prime-video.png" alt="Amazon" width="128px" height="128px">
                            </span>
                        </span>
                        <figcaption class="nome-servico">Amazon Prime Video</figcaption>
                    </figure>
                </a>
            </li>
            <li class="item-servico">
                <a href="perfil/perfil.html" class="servico" id="btn-netflix">
                    <figure class="avatar-container">
                        <span class="imagem-perfil tema-cris" aria-hidden="true">
                            <span class="icone-avatar">
                                <img src="assets/logo-netflix.png" alt="Perfil de Gabriel" width="128px" height="128px">
                            </span>
                        </span>
                        <figcaption class="nome-servico">Netflix</figcaption>
                    </figure>
                </a>
            </li>
            <li class="item-servico">
                <a href="https://www.disneyplus.com/pt-br?gclsrc=aw.ds&cid=DSS-Search-Google-11533092612-&s_kwcid=AL!8468!3!798582264428!e!!g!!174457321395-11338870&gad_source=1&gad_campaignid=11533092612&gbraid=0AAAAACzWEUGpUNIkmSHJIllq36QdPBni0&gclid=CjwKCAjw-J3OBhBuEiwAwqZ_h6fOUyLscGZu1T_OO1XPaZX3NAYERzaxK3QiVUaYR8u9MMVTQNib0hoC8eQQAvD_BwE" class="servico">
                    <figure class="avatar-container">
                        <span class="imagem-perfil tema-cris" aria-hidden="true">
                            <span class="icone-avatar">
                                <img src="assets/disney.png" alt="Disney +" width="128px" height="128px">
                            </span>
                        </span>
                        <figcaption class="nome-servico">Disney + </figcaption>
                    </figure>
                </a>
            </li>

        </ul>

    </main>

    <div id="video-overlay">
        <video id="netflix-video" preload="auto" playsinline>
            <source src="assets/netflix-intro.mp4" type="video/mp4">
            Seu navegador não suporta vídeos.
        </video>
    </div>

    <script src="js/video.js"></script>
    <script src="perfil/js/index.js"></script>

</body>

</html>
